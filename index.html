<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cineworld - Movie Stream</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: #e50914;
        }
        .movie-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .movie-card {
            background-color: #1f1f1f;
            padding: 15px;
            border-radius: 8px;
            width: 200px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .movie-card h3 {
            font-size: 16px;
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <h1>Cineworld Movies</h1>
    <p>අපේ අලුත්ම චිත්‍රපට එකතුව</p>

    <div class="movie-container" id="movieList">
        <!-- Movies ටික මෙතනට Database එකෙන් Load වේවි -->
    </div>

    <!-- JavaScript ෆයිල් එක මෙතනින් සම්බන්ධ කර ඇත -->
    <script type="module" src="app.js"></script>
</body>
</html>
