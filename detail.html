<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Details - CINEWORLD</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-black text-white font-sans antialiased min-h-screen selection:bg-red-600 selection:text-white">

    <!-- Navigation Header -->
    <header class="bg-gray-900/80 border-b border-gray-800 px-6 py-4 flex items-center justify-between sticky top-0 z-40 backdrop-blur-md">
        <a href="index.html" class="text-red-500 hover:text-white flex items-center gap-2 font-semibold text-xs sm:text-sm transition">
            <i class="fa-solid fa-arrow-left"></i> මුල් පිටුවට (Home)
        </a>
        <div class="text-xl font-extrabold text-red-600 tracking-wider">
            CINE<span class="text-white">WORLD</span>
        </div>
    </header>

    <!-- Content Container -->
    <main class="max-w-4xl mx-auto px-4 py-8 space-y-8">
        
        <!-- Poster & Basic Info Card -->
        <div class="bg-gray-900 border border-gray-800 rounded-2xl overflow-hidden shadow-2xl grid md:grid-cols-3 gap-6 p-6">
            <div class="h-80 md:h-auto rounded-xl overflow-hidden bg-gray-950">
                <img id="moviePoster" src="" alt="Poster" class="w-full h-full object-cover">
            </div>
            <div class="md:col-span-2 space-y-4 flex flex-col justify-center">
                <h1 id="movieTitle" class="text-2xl sm:text-4xl font-extrabold text-white">පූරණය වෙමින්...</h1>
                <p id="movieDescription" class="text-gray-300 text-xs sm:text-sm leading-relaxed">විස්තර පූරණය වෙමින් පවතී...</p>
                
                <div class="flex flex-wrap gap-3 text-xs text-gray-400 pt-2">
                    <span id="movieYear" class="bg-gray-800 px-3 py-1.5 rounded-lg border border-gray-700">Year: --</span>
                    <span id="movieCategory" class="bg-gray-800 px-3 py-1.5 rounded-lg border border-gray-700">Category: --</span>
                </div>
            </div>
        </div>

        <!-- Cast Section -->
        <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl space-y-3 shadow-xl">
            <h3 class="text-base font-bold flex items-center gap-2 text-red-500">
                <i class="fa-solid fa-users"></i> රංගන ශිල්පීන් (Cast)
            </h3>
            <p id="movieCast" class="text-gray-300 text-sm bg-gray-950 p-4 rounded-xl border border-gray-800">--</p>
        </div>

        <!-- YouTube Trailer Section -->
        <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl space-y-4 shadow-xl">
            <h3 class="text-base font-bold flex items-center gap-2 text-red-500">
                <i class="fa-brands fa-youtube text-lg"></i> නිල YouTube ට්‍රේලරය (Official Trailer)
            </h3>
            <div id="trailerContainer" class="aspect-video w-full rounded-xl overflow-hidden bg-gray-950 flex items-center justify-center border border-gray-800">
                <p class="text-gray-500 text-xs">ට්‍රේලරයක් නොමැත</p>
            </div>
        </div>

        <!-- Telegram Download Button -->
        <div class="pt-2">
            <a id="telegramBtn" href="#" target="_blank" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition flex items-center justify-center gap-3 shadow-lg shadow-blue-600/20 text-base hidden">
                <i class="fa-brands fa-telegram text-2xl"></i> Telegram හරහා Film එක Download කරන්න
            </a>
        </div>

    </main>

    <!-- Detail Logic Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADNg0HkcGg7SisAq_Cjbfqqc9rH0Nv4-I",
            authDomain: "cineworld-901cb.firebaseapp.com",
            projectId: "cineworld-901cb",
            storageBucket: "cineworld-901cb.firebasestorage.app",
            messagingSenderId: "518573519989",
            appId: "1:518573519989:web:9055e0d6efd4b9b7b2743c",
            measurementId: "G-LP2CXFHMN0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        function escapeHTML(str) {
            return String(str || '').replace(/[&<>"']/g, function(m) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m];
            });
        }

        const urlParams = new URLSearchParams(window.location.search);
        const movieId = urlParams.get('id');

        async function loadMovieDetails() {
            if (!movieId) {
                document.getElementById('movieTitle').innerText = "චිත්‍රපටයක් තෝරා නැත!";
                return;
            }

            try {
                const docRef = doc(db, "movies", movieId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const movie = docSnap.data();
                    
                    document.getElementById('movieTitle').innerText = movie.title || "Untitled";
                    document.getElementById('moviePoster').src = movie.imageUrl || "";
                    document.getElementById('movieDescription').innerText = movie.description || "විස්තර ලබා දී නොමැත.";
                    document.getElementById('movieYear').innerText = `Year: ${movie.year || 'N/A'}`;
                    document.getElementById('movieCategory').innerText = `Category: ${movie.category || 'Movie'}`;
                    document.getElementById('movieCast').innerText = movie.cast || "විස්තර නොමැත.";

                    if (movie.telegramLink) {
                        const tgBtn = document.getElementById('telegramBtn');
                        tgBtn.href = movie.telegramLink;
                        tgBtn.classList.remove('hidden');
                    }

                    if (movie.youtubeUrl) {
                        let embedUrl = movie.youtubeUrl;
                        if (embedUrl.includes("watch?v=")) {
                            embedUrl = embedUrl.replace("watch?v=", "embed/");
                        } else if (embedUrl.includes("youtu.be/")) {
                            embedUrl = embedUrl.replace("youtu.be/", "www.youtube.com/embed/");
                        }
                        
                        document.getElementById('trailerContainer').innerHTML = `
                            <iframe src="${escapeHTML(embedUrl)}" class="w-full h-full" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                        `;
                    }
                } else {
                    document.getElementById('movieTitle').innerText = "මෙම චිත්‍රපටය දත්ත ගබඩාවේ නැත.";
                }
            } catch (error) {
                console.error("Error loading movie details:", error);
            }
        }

        loadMovieDetails();
    </script>
</body>
</html>
